services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A core.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build: .
    command: celery -A core.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
